# Base config for dristi-monolith.
# Per-environment overrides live in application-<profile>.yml — defaults here
# are intentionally minimal so a missing `spring.profiles.active` is loud.
#
# Endpoint paths follow the legacy lock-svc shape: requests come in at
# /lock-svc/v1/_set etc. Once additional services migrate into the monolith,
# the per-service context path approach is replaced by per-controller
# `@RequestMapping("/lock-svc")` prefixes (Pipeline 5 — Config Consolidation).
server:
  port: 8080
  servlet:
    context-path: /lock-svc

spring:
  application:
    name: dristi-monolith
  main:
    allow-bean-definition-overriding: true
  profiles:
    # Order matters — later profiles override earlier ones for conflicting
    # keys. `shared` carries values every consolidated service agrees on;
    # per-subdomain profiles (cases / locksvc / ...) overlay subdomain
    # config; `local` overrides DB/host/etc. for local dev.
    active: shared,cases,locksvc,local

  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        order_inserts: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true
    locations: classpath:/db/migration/main
    table: public-monolith

  kafka:
    consumer:
      group-id: dristi-monolith
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.egov.tracer.kafka.deserializer.HashMapDeserializer
      properties:
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      missing-topics-fatal: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info

app:
  timezone: Asia/Kolkata

logging:
  level:
    root: INFO
