# Activate via spring.profiles.active=...,notification,...

app:
  timezone: Asia/Kolkata
otel:
  instrumentation:
    http:
      server:
        ignore-urls: /notification/health,/notification/prometheus
kafka:
  consumer:
    config:
      auto_commit: true
      auto_commit_interval: 100
      session_timeout: 15000
      auto_offset_reset: earliest
  producer:
    config:
      retries_config: 0
      batch_size_config: 16384
      linger_ms_config: 1
      buffer_memory_config: 33554432
  topics:
    receipt:
      create: dss-collection
    consumer: service-consumer-topic
egov:
  mdms:
    host: https://dev.digit.org
    search:
      endpoint: /egov-mdms-service/v1/_search
  user:
    host: https://dev.digit.org
    context:
      path: /user/users
    create:
      path: /_createnovalidate
    search:
      path: /user/_search
    update:
      path: /_updatenovalidate
  localization:
    host: https://dev.digit.org
    workDir:
      path: /localization/messages/v1
    context:
      path: /localization/messages/v1
    statelevel: true
    search:
      endpoint: /_search
  hrms:
    host: https://dev.digit.org
    search:
      endpoint: /egov-hrms/employees/_search
  idgen:
    host: https://dev.digit.org/
    path: egov-idgen/id/_generate
    notification:
      config: court-notification.[TENANT_ID]
      format: '[TENANT_ID][SEQ_NT_[TENANT_ID]][cy:yyyy]-NT'
  filestore:
